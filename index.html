<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <h1>Expense &amp; Budget Visualizer</h1>
      <div id="balance-display">Total: $0.00</div>
    </header>
    <main>
      <section id="form-section">
        <form id="transaction-form">
          <div class="form-field">
            <label for="input-name">Item Name</label>
            <input id="input-name" type="text" maxlength="100" placeholder="e.g. Lunch" />
          </div>
          <div class="form-field">
            <label for="input-amount">Amount</label>
            <input id="input-amount" type="number" min="0.01" step="0.01" placeholder="0.00" />
          </div>
          <div class="form-field">
            <label for="input-category">Category</label>
            <select id="input-category">
              <option value="" disabled selected>-- Select Category --</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
          </div>
          <button type="submit">Add Transaction</button>
        </form>
        <div id="form-error" role="alert" aria-live="polite"></div>
      </section>

      <section id="list-section">
        <ul id="transaction-list"></ul>
      </section>

      <section id="chart-section">
        <canvas id="spending-chart"></canvas>
        <div id="chart-placeholder">No data yet</div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
